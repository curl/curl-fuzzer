name: ACR

'on':
  push:
    branches:
      - master

  schedule:
    - cron: '37 6 * * *'  # Daily at 06:37 UTC.

  # Triggerable from PRs, but permission must be requested.
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  acr:
    name: 'Build ${{ matrix.sanitizer }}/${{ matrix.engine }}'
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/master' && 'acrmaster' || 'acrpr' }}
    permissions:
      contents: read
      id-token: write  # Required for OIDC authentication to Azure.
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined]
        engine: [libfuzzer, honggfuzz]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: google/oss-fuzz
          path: .oss-fuzz

      - name: Set date tag
        id: date
        run: echo "tag=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Restore build cache
        id: build-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build
          key: acr-build-${{ matrix.sanitizer }}-${{ matrix.engine }}-${{ hashFiles('CMakeLists.txt', 'scripts/compile_target.sh', 'scripts/ossfuzzdeps.sh', 'ossfuzz.sh') }}
          restore-keys: |
            acr-build-${{ matrix.sanitizer }}-${{ matrix.engine }}-

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.ACR_CLIENT_ID }}
          tenant-id: ${{ secrets.ACR_TENANT_ID }}
          subscription-id: ${{ secrets.ACR_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${ACR_LOCATION%.azurecr.io}"
        env:
          ACR_LOCATION: ${{ secrets.ACR_LOCATION }}

      - name: Build repro image
        env:
          ACR_LOCATION: ${{ secrets.ACR_LOCATION }}
          SANITIZER: ${{ matrix.sanitizer }}
          ENGINE: ${{ matrix.engine }}
          DATE_TAG: ${{ steps.date.outputs.tag }}
        run: |
          IMAGE="${ACR_LOCATION}/curl-fuzzer/${SANITIZER}-${ENGINE}:${DATE_TAG}"
          python3 scripts/build_repro_image.py \
            --sanitizer "${SANITIZER}" \
            --engine "${ENGINE}" \
            --source-path . \
            --oss-fuzz-dir .oss-fuzz \
            --tag "${IMAGE}"
          docker tag "${IMAGE}" "${ACR_LOCATION}/curl-fuzzer/${SANITIZER}-${ENGINE}:latest"

      - name: Save build cache
        if: steps.build-cache.outputs.cache-hit != 'true' && github.ref == 'refs/heads/master'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build
          key: acr-build-${{ matrix.sanitizer }}-${{ matrix.engine }}-${{ hashFiles('CMakeLists.txt', 'scripts/compile_target.sh', 'scripts/ossfuzzdeps.sh', 'ossfuzz.sh') }}

      - name: Test image
        env:
          ACR_LOCATION: ${{ secrets.ACR_LOCATION }}
          SANITIZER: ${{ matrix.sanitizer }}
          ENGINE: ${{ matrix.engine }}
          DATE_TAG: ${{ steps.date.outputs.tag }}
        run: |
          IMAGE="${ACR_LOCATION}/curl-fuzzer/${SANITIZER}-${ENGINE}:${DATE_TAG}"
          docker run --rm "${IMAGE}" gdb --version
          docker run --rm "${IMAGE}" ls /out/curl_fuzzer

      - name: Push image
        env:
          ACR_LOCATION: ${{ secrets.ACR_LOCATION }}
          SANITIZER: ${{ matrix.sanitizer }}
          ENGINE: ${{ matrix.engine }}
          DATE_TAG: ${{ steps.date.outputs.tag }}
        run: |
          docker push "${ACR_LOCATION}/curl-fuzzer/${SANITIZER}-${ENGINE}:${DATE_TAG}"
          docker push "${ACR_LOCATION}/curl-fuzzer/${SANITIZER}-${ENGINE}:latest"
