name: ACR

'on':
  push:
    branches:
      - master

  # Triggerable from PRs, but permission must be requested.
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  acr:
    name: 'Build and push to ACR'
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/master' && 'acrmaster' || 'acrpr' }}
    permissions:
      contents: read
      id-token: write  # Required for OIDC authentication to Azure.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.ACR_CLIENT_ID }}
          tenant-id: ${{ secrets.ACR_TENANT_ID }}
          subscription-id: ${{ secrets.ACR_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${ACR_LOCATION}"
        env:
          ACR_LOCATION: ${{ secrets.ACR_LOCATION }}

      - name: Build and push
        run: |
          docker build -f docker/Dockerfile -t "${ACR_LOCATION}/test:${GITHUB_SHA}" .
          docker push "${ACR_LOCATION}/test:${GITHUB_SHA}"
        env:
          ACR_LOCATION: ${{ secrets.ACR_LOCATION }}
