# Workflow used by curl/curl

name: CI

'on':
  push:
    branches:
      - master
      - main
      - '*/ci'
  pull_request:
    branches:
      - master
      - main
  # This makes the workflow callable by curl/curl
  workflow_call: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions: {}

env:
  DO_NOT_TRACK: '1'

jobs:
  DetermineMatrix:
    name: 'Determine matrix'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          repository: curl/curl-fuzzer

      - name: Set matrix
        id: set-matrix
        run: |
          . ./scripts/fuzz_targets
          cd src/curl_fuzzer_tools
          python3 -m generate_matrix | tee $GITHUB_OUTPUT

  BuildFuzzers:
    name: 'Build fuzzers'
    runs-on: ubuntu-latest
    env:
      # Must match the path ossfuzz.sh writes to when CIFUZZ=True.
      CACHE_PATH: .ossfuzz-build-cache-address-x86_64
    steps:
      # Check out the calling repo (curl/curl on workflow_call, curl-fuzzer
      # on push/PR). CIFuzz mounts this into the build container.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Check out curl-fuzzer into a subdirectory so the cache key can hash
      # the build-definition files and trim_cache.sh is available. When
      # running on curl-fuzzer itself, use the PR/push ref; when called from
      # curl/curl via workflow_call, default to master.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          repository: curl/curl-fuzzer
          ref: ${{ github.repository == 'curl/curl-fuzzer' && github.ref || '' }}
          path: .curl-fuzzer

      - name: Restore build cache
        id: build-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.CACHE_PATH }}
          key: ossfuzz-build-v2-${{ runner.os }}-address-x86_64-${{ hashFiles('.curl-fuzzer/CMakeLists.txt', '.curl-fuzzer/scripts/compile_target.sh', '.curl-fuzzer/scripts/ossfuzzdeps.sh', '.curl-fuzzer/scripts/trim_cache.sh', '.curl-fuzzer/ossfuzz.sh') }}
          restore-keys: |
            ossfuzz-build-v2-${{ runner.os }}-address-x86_64-

      # Use the CIFuzz job to test the repository.
      - name: Build Fuzzers
        uses: google/oss-fuzz/infra/cifuzz/actions/build_fuzzers@master  # zizmor: ignore[unpinned-uses]
        with:
          oss-fuzz-project-name: 'curl'
          dry-run: false
          keep-unaffected-fuzz-targets: true

      - name: Trim build cache
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: sudo .curl-fuzzer/scripts/trim_cache.sh "${CACHE_PATH}/build"

      - name: Save build cache
        if: steps.build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.CACHE_PATH }}
          key: ossfuzz-build-v2-${{ runner.os }}-address-x86_64-${{ hashFiles('.curl-fuzzer/CMakeLists.txt', '.curl-fuzzer/scripts/compile_target.sh', '.curl-fuzzer/scripts/ossfuzzdeps.sh', '.curl-fuzzer/scripts/trim_cache.sh', '.curl-fuzzer/ossfuzz.sh') }}

      # Archive the fuzzer output (which maintains permissions)
      - name: Create fuzz tar
        run: tar cvf fuzz.tar build-out/

      # Upload the fuzzer output
      - name: Archive fuzz tar
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz_tar
          path: fuzz.tar

  RunFuzzers:
    name: 'Run fuzzers'
    needs: [BuildFuzzers, DetermineMatrix]
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      matrix: ${{ fromJSON(needs.DetermineMatrix.outputs.matrix) }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 2
        with:
          name: fuzz_tar
      - name: Unpack fuzzer ${{ matrix.fuzzer }}
        env:
          MATRIX_FUZZER: '${{ matrix.fuzzer }}'
        run: tar xvf fuzz.tar build-out/"${MATRIX_FUZZER}" build-out/"${MATRIX_FUZZER}"_seed_corpus.zip
      - name: Display extracted files
        run: ls -laR build-out/
      - name: Run Fuzzer ${{ matrix.fuzzer }}
        uses: google/oss-fuzz/infra/cifuzz/actions/run_fuzzers@master  # zizmor: ignore[unpinned-uses]
        timeout-minutes: 6
        with:
          oss-fuzz-project-name: 'curl'
          fuzz-seconds: 120
          dry-run: false
      - name: Upload Crash
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() }}
        with:
          name: artifacts
          path: ./out/artifacts
