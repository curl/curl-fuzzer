# Workflow used by curl/curl

name: CI

'on':
  push:
    branches:
      - master
      - main
      - '*/ci'
  pull_request:
    branches:
      - master
      - main
  # This makes the workflow callable by curl/curl
  workflow_call: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions: {}

jobs:
  DetermineMatrix:
    name: 'Determine matrix'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: curl/curl-fuzzer

      - name: Set matrix
        id: set-matrix
        run: |
          . ./scripts/fuzz_targets
          cd src/curl_fuzzer_tools
          python3 -m generate_matrix | tee $GITHUB_OUTPUT

  BuildFuzzers:
    name: 'Build fuzzers'
    runs-on: ubuntu-latest
    env:
      # Must match the path ossfuzz.sh writes to when CIFUZZ=True.
      CACHE_PATH: .ossfuzz-build-cache-address-x86_64
    steps:
      # Check out curl-fuzzer on the runner so the cache key can hash the
      # build-definition files. CIFuzz still uses its own clone baked into the
      # gcr.io/oss-fuzz/curl image, so this checkout does not affect the build.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore build cache
        id: build-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.CACHE_PATH }}
          key: ossfuzz-build-v1-${{ runner.os }}-address-x86_64-${{ hashFiles('CMakeLists.txt', 'scripts/compile_target.sh', 'scripts/ossfuzzdeps.sh', 'ossfuzz.sh') }}
          restore-keys: |
            ossfuzz-build-v1-${{ runner.os }}-address-x86_64-

      # Use the CIFuzz job to test the repository.
      - name: Build Fuzzers
        uses: google/oss-fuzz/infra/cifuzz/actions/build_fuzzers@master  # zizmor: ignore[unpinned-uses]
        with:
          oss-fuzz-project-name: 'curl'
          dry-run: false
          keep-unaffected-fuzz-targets: true

      - name: Save build cache
        if: steps.build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.CACHE_PATH }}
          key: ossfuzz-build-v1-${{ runner.os }}-address-x86_64-${{ hashFiles('CMakeLists.txt', 'scripts/compile_target.sh', 'scripts/ossfuzzdeps.sh', 'ossfuzz.sh') }}

      # Archive the fuzzer output (which maintains permissions)
      - name: Create fuzz tar
        run: tar cvf fuzz.tar build-out/

      # Upload the fuzzer output
      - name: Archive fuzz tar
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: fuzz_tar
          path: fuzz.tar

  RunFuzzers:
    name: 'Run fuzzers'
    needs: [BuildFuzzers, DetermineMatrix]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.DetermineMatrix.outputs.matrix) }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: fuzz_tar
      - name: Unpack fuzzer ${{ matrix.fuzzer }}
        env:
          MATRIX_FUZZER: '${{ matrix.fuzzer }}'
        run: tar xvf fuzz.tar build-out/"${MATRIX_FUZZER}" build-out/"${MATRIX_FUZZER}"_seed_corpus.zip
      - name: Display extracted files
        run: ls -laR build-out/
      - name: Run Fuzzer ${{ matrix.fuzzer }}
        uses: google/oss-fuzz/infra/cifuzz/actions/run_fuzzers@master  # zizmor: ignore[unpinned-uses]
        with:
          oss-fuzz-project-name: 'curl'
          fuzz-seconds: 120
          dry-run: false
      - name: Upload Crash
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ failure() }}
        with:
          name: artifacts
          path: ./out/artifacts
