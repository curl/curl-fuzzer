name: Coverage

'on':
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  DO_NOT_TRACK: '1'

jobs:
  Coverage:
    name: 'Coverage'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo find /etc/apt/sources.list.d -type f -not -name 'ubuntu.sources' -delete -print
          sudo apt-get -o Dpkg::Use-Pty=0 update
          sudo apt-get -o Dpkg::Use-Pty=0 install cmake clang llvm ninja-build unzip

      # Cache the public OSS-Fuzz corpora by ISO week so we're not pulling
      # several hundred MB on every run but we still refresh weekly.
      - name: Compute corpus cache key
        id: corpus-key
        run: echo "week=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: Restore public corpus cache
        id: corpus-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ossfuzz_corpus
          key: ossfuzz-corpus-${{ steps.corpus-key.outputs.week }}

      - name: Download public OSS-Fuzz corpora
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: ./scripts/download_public_corpus.sh

      - name: Build instrumented fuzzers and replay corpora
        run: ./codecoverage.sh

      - name: Publish summary
        if: always()
        run: |
          if [[ -f build-coverage/coverage/summary.txt ]]; then
            {
              echo "## Coverage summary"
              echo ''
              echo '```'
              cat build-coverage/coverage/summary.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'build-coverage/coverage/summary.txt not produced' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            build-coverage/coverage/html
            build-coverage/coverage/summary.txt
          if-no-files-found: warn
