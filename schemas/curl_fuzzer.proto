syntax = "proto3";

package curl.fuzzer.proto;

// Structured HTTP scenario description for the curl-fuzzer libprotobuf-mutator
// driver. One scenario configures a single easy handle and feeds a single mock
// connection.

message Scenario {
  // Scheme + host_path compose the request URL. Splitting them keeps the
  // mutator honest: it can vary the scheme (and therefore the dispatch path
  // in the runner) independently of the rest of the URL, without hand-rolled
  // string matching to discover ws:// vs http://.
  Scheme scheme = 1;
  // Everything after the "://" — host, optional port, and path. The runner
  // does not validate or percent-encode this; bytes land on the wire as-is.
  // Declared as `bytes` rather than `string` because a libFuzzer / LPM mutator
  // will cheerfully produce non-UTF-8 byte sequences here, and proto3's
  // `string` validator warns on those at parse time even though the bytes are
  // preserved. Using `bytes` skips the validator; curl's URL parser is happy
  // with raw bytes and will reject anything invalid itself.
  bytes host_path = 2;
  repeated SetOption options = 3;
  Connection connection = 4;
}

enum Scheme {
  SCHEME_UNSPECIFIED = 0;
  SCHEME_HTTP = 1;
  SCHEME_HTTPS = 2;
  SCHEME_WS = 3;
  SCHEME_WSS = 4;
}

message SetOption {
  CurlOptionId option_id = 1;
  oneof value {
    bytes  string_value = 10;
    uint64 uint_value   = 11;
    bool   bool_value   = 12;
  }
}

message Connection {
  // Bytes written to the mock server fd as soon as curl opens the socket.
  bytes initial_response = 1;
  // Subsequent chunks, each sent the next time the fd becomes readable.
  repeated bytes on_readable = 2;
  // Structured WebSocket frames. Each frame is serialised to RFC 6455 wire
  // format and pushed onto the socket in order, as an alternative to the
  // raw bytes in on_readable. Useful for scenarios where the mutator should
  // explore frame fields (opcode, flags, length) independently of payload
  // bytes. on_readable is still available for malformed / truncated frames.
  repeated WebSocketFrame server_frames = 3;
  // Deterministic backpressure knobs for the curl→mock direction. Shrink the
  // kernel recv buffer and/or cap how much the mock drains per call, to force
  // curl's send() into short-write / EAGAIN paths (ws_send_raw_blocking's
  // partial-write loop, ws_flush's CURLE_AGAIN branch, ws_enc_add_pending,
  // etc). Left at defaults (0/0) the mock drains greedily and nothing
  // backpressures — same behaviour as before this field existed.
  BackpressureConfig backpressure = 4;
  // Opt-in probes run in the CONNECT_ONLY=2 manual-drive tail. Each probe
  // targets a specific region of ws.c; default-off keeps new scenarios
  // focused on the behaviour they're exercising. Ignored when the scenario
  // isn't in manual-drive mode.
  WsManualProbes manual_probes = 5;
}

// Gates the optional client-side send probes fired from the manual-drive
// tail in WebSocketMockServer::RunLoop. All bools default to false, so
// adding this message to a scenario is purely additive — existing scenarios
// that don't set it skip every probe and simply exercise curl_ws_recv plus
// whatever raw frame bytes are queued.
message WsManualProbes {
  // Walk curl_ws_start_frame / curl_ws_send through kWsSendFlagMatrix.
  // Covers ws_frame_flags2firstbyte branches plus invalid-flag failf paths.
  bool flag_matrix = 1;
  // Declare a fragsize=200 frame, send 23 bytes, then send a 500-byte buffer
  // — trips the "unaligned frame size" guard in ws_enc_send.
  bool unaligned_send = 2;
  // curl_ws_send with flags=0, fragsize=0. In CURLWS_RAW_MODE this hits the
  // ws_raw_mode / ws_send_raw branch; otherwise it reaches the "no flags
  // given" rejection (already covered elsewhere).
  bool raw_send = 3;
}

// Tunes how aggressively the mock drains bytes curl sends it. Deterministic
// by construction: both knobs are byte-budgets, not time-budgets, so a
// scenario's kernel-buffer trajectory is a pure function of the scripted
// byte stream. The existing select() timeout in WaitOnMultiFdset remains
// the only wall-clock input to the drive loop.
message BackpressureConfig {
  // SO_RCVBUF applied to the mock-server side of the socketpair. When >0
  // this caps how many bytes curl can push into the pipe before its send()
  // short-writes or returns EAGAIN. Linux clamps below SOCK_MIN_RCVBUF
  // (~2 KB after doubling); effectively a floor around 2048.
  uint32 recv_buf_bytes = 1;
  // Upper bound on bytes drained per DrainIncoming() call. 0 = unlimited
  // (legacy behaviour). Small values keep the mock-side recv buffer full
  // so curl keeps seeing short writes across multiple loop iterations.
  uint32 drain_limit = 2;
}

// One WebSocket frame to be emitted by the mock server. Field semantics
// mirror RFC 6455 §5.2; no validation is applied — the point of the fuzzer
// is to exercise curl's parser against both well-formed and malformed
// inputs, so e.g. opcode=15 or rsv bits set will simply land on the wire.
message WebSocketFrame {
  // Final fragment bit (bit 0 of byte 0).
  bool fin = 1;
  // Reserved bits. Any non-zero value should trip the extension-negotiation
  // checks in curl's decoder.
  bool rsv1 = 2;
  bool rsv2 = 3;
  bool rsv3 = 4;
  // Opcode nibble (low 4 bits of byte 0). Values > 15 are masked to 4 bits.
  uint32 opcode = 5;
  // Mask bit + 32-bit masking key. The serializer XORs the payload if set.
  bool masked = 6;
  uint32 mask_key = 7;
  // Payload bytes (length implied — the serializer picks the narrowest
  // length encoding unless length_form overrides it).
  bytes payload = 8;
  // Force a specific length-encoding form: 0 = auto, 1 = 7-bit, 2 = 16-bit
  // (0x7E marker), 3 = 64-bit (0x7F marker). Lets scenarios exercise the
  // extended-length decode paths even for small payloads.
  uint32 length_form = 9;
}

// Populated at build time by generate_option_manifest.py. Keep the
// UNSPECIFIED entry so the raw zero tag is harmless.
enum CurlOptionId {
  CURL_OPTION_UNSPECIFIED = 0;
  // GENERATED-OPTIONS-BEGIN
  // GENERATED-OPTIONS-END
}
